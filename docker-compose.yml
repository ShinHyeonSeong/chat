# ============================================================
# docker-compose.yml — 전체 서비스 오케스트레이션
# ============================================================
#
# [Docker Compose란?]
#   여러 컨테이너를 한 파일로 정의하고 한 번에 실행/중지하는 도구입니다.
#   "docker run ..." 명령을 여러 번 치는 대신, 이 파일 하나로 관리합니다.
#
# [사용 명령어]
#   docker compose up -d        → 백그라운드로 전체 실행
#   docker compose down         → 전체 중지 및 컨테이너 삭제
#   docker compose down -v      → 중지 + 볼륨(데이터)까지 삭제
#   docker compose logs -f app  → app 서비스 로그 실시간 확인
#   docker compose ps           → 실행 중인 컨테이너 목록 확인
# ============================================================

# Compose 파일 버전 (현재 최신 권장 버전)
version: "3.9"

# ============================================================
# 볼륨(Volumes) 정의
# ============================================================
# [볼륨이란?]
#   컨테이너는 기본적으로 삭제되면 내부 데이터도 사라집니다.
#   볼륨은 데이터를 컨테이너 외부(호스트 머신 또는 Docker 관리 공간)에
#   저장하여 컨테이너가 재시작/삭제되어도 데이터를 유지합니다.
# ============================================================
volumes:
  mariadb_data:    # MariaDB 데이터 파일 (테이블, 레코드 등) 영속 저장
  redis_data:      # Redis 데이터 영속 저장

# ============================================================
# 네트워크 정의
# ============================================================
# [네트워크란?]
#   같은 네트워크에 속한 컨테이너끼리는 서비스 이름으로 통신할 수 있습니다.
#   예: Spring Boot → MariaDB 연결 시 host를 "mariadb"로 지정
# ============================================================
networks:
  chat-network:
    driver: bridge  # 기본 네트워크 방식. 호스트와 격리된 가상 네트워크를 생성

# ============================================================
# 서비스(Services) 정의
# ============================================================
# 각 서비스 = 하나의 컨테이너
# ============================================================
services:

  # ----------------------------------------------------------
  # 1. MariaDB — 관계형 데이터베이스
  # ----------------------------------------------------------
  mariadb:
    # image: Docker Hub에서 내려받을 공식 이미지 이름과 버전 태그
    # "latest" 대신 특정 버전을 고정하면 환경 일관성이 보장됩니다.
    image: mariadb:11.4

    # container_name: 이 컨테이너의 고유 이름 (docker ps에서 보임)
    container_name: chat-mariadb

    # networks: 이 컨테이너가 속할 네트워크 목록
    networks:
      - chat-network

    # ports: "호스트포트:컨테이너포트" 형식으로 포트를 외부에 노출합니다.
    # 호스트에서 3306 포트로 접속하면 컨테이너의 3306으로 전달됩니다.
    # (DBeaver 같은 로컬 DB 클라이언트로 접속할 때 사용)
    ports:
      - "3307:3306"

    # environment: 컨테이너 안에서 사용할 환경변수를 설정합니다.
    # MariaDB 공식 이미지는 이 환경변수를 읽어 초기 설정을 진행합니다.
    environment:
      MARIADB_ROOT_PASSWORD: "3284"       # root 계정 비밀번호
      MARIADB_DATABASE: "chat"            # 자동으로 생성할 데이터베이스 이름
      MARIADB_CHARACTER_SET_SERVER: utf8mb4
      MARIADB_COLLATION_SERVER: utf8mb4_0900_ai_ci

    # volumes: "볼륨명 또는 호스트경로:컨테이너경로" 형식
    volumes:
      # MariaDB 데이터 디렉터리를 볼륨에 연결 → 컨테이너 재시작 후에도 데이터 유지
      - mariadb_data:/var/lib/mysql
      # 초기화 SQL 스크립트: /docker-entrypoint-initdb.d/ 에 넣으면
      # MariaDB 최초 실행 시 자동으로 실행됩니다. (이미 DB가 있으면 건너뜀)
      - ./docs/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    # healthcheck: 컨테이너가 "준비됐는지" 주기적으로 확인합니다.
    # 단순히 프로세스가 살아있는 것과, 실제로 쿼리를 받을 수 있는 것은 다릅니다.
    # 다른 서비스의 depends_on 에서 이 상태를 활용합니다.
    healthcheck:
      # mysqladmin ping: MariaDB 서버에 "살아있니?" 신호를 보내는 명령
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s    # 10초마다 체크
      timeout: 5s      # 5초 안에 응답 없으면 실패
      retries: 5       # 5번 실패하면 unhealthy 판정
      start_period: 30s # 컨테이너 시작 후 30초는 실패해도 무시 (초기 구동 시간 확보)

    # restart: 컨테이너가 비정상 종료될 때 재시작 정책
    # "unless-stopped": 수동으로 멈추지 않는 한 항상 재시작
    restart: unless-stopped

  # ----------------------------------------------------------
  # 2. Redis — 캐시 서버
  # ----------------------------------------------------------
  redis:
    image: redis:7.4-alpine  # alpine: 경량 Linux 기반, 이미지 크기 작음

    container_name: chat-redis

    networks:
      - chat-network

    ports:
      - "6379:6379"

    # Redis 명령어 옵션:
    #   --appendonly yes: AOF(Append Only File) 방식으로 데이터를 디스크에 저장
    #                     Redis는 기본적으로 메모리 DB라 재시작 시 데이터가 사라집니다.
    #                     이 옵션을 켜면 모든 쓰기 작업을 파일에 기록해 복구 가능합니다.
    command: redis-server --appendonly yes

    volumes:
      - redis_data:/data  # Redis 데이터 디렉터리

    healthcheck:
      # redis-cli ping: Redis 서버에 PING 명령을 보내고 PONG 응답을 확인
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

    restart: unless-stopped

  # ----------------------------------------------------------
  # 3. app — Spring Boot 애플리케이션
  # ----------------------------------------------------------
  app:
    # build: 이미지를 Docker Hub에서 받지 않고 직접 빌드합니다.
    build:
      context: .          # Dockerfile이 있는 위치 (현재 디렉터리)
      dockerfile: Dockerfile

    container_name: chat-app

    networks:
      - chat-network

    # 호스트의 8003 포트 → 컨테이너의 8003 포트로 연결
    ports:
      - "8003:8003"

    # environment: Spring Boot에 전달할 환경변수
    # application-docker.yml 을 활성화해 Docker 전용 설정을 적용합니다.
    environment:
      # 이 변수가 있으면 Spring Boot는 application-docker.yml을 추가로 읽습니다.
      # application.yml의 설정을 오버라이드할 수 있습니다.
      SPRING_PROFILES_ACTIVE: docker

    # depends_on: 이 서비스보다 먼저 시작해야 할 서비스를 지정합니다.
    # condition: service_healthy → 해당 서비스의 healthcheck가 통과될 때까지 대기
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: unless-stopped