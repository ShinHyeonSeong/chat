<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>WebSocket E2E Test</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@6/bundles/stomp.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: monospace; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        section { border: 1px solid #ccc; padding: 16px; margin-bottom: 16px; border-radius: 4px; }
        h3 { margin-top: 0; }
        input { padding: 4px; margin-right: 8px; }
        button { padding: 4px 12px; cursor: pointer; }

        /* 채팅 UI */
        #chatArea {
            display: flex;
            flex-direction: column;
            height: 420px;
            border: 1px solid #ccc;
            border-radius: 6px;
            overflow: hidden;
        }
        #chatHeader {
            background: #3366cc;
            color: #fff;
            padding: 10px 16px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #connDot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #aaa;
            flex-shrink: 0;
        }
        #connDot.on  { background: #4caf50; }
        #connDot.off { background: #aaa; }
        #chatMessages {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #chatMessages .empty-hint {
            color: #aaa;
            text-align: center;
            margin: auto;
            font-size: 13px;
        }

        /* TODO(human): 말풍선 스타일 — .bubble-row, .bubble-mine, .bubble-other 구현 */

        #chatInputRow {
            display: flex;
            border-top: 1px solid #ddd;
            background: #fff;
        }
        #chatInputRow input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 14px;
            font-size: 14px;
            font-family: monospace;
            margin: 0;
        }
        #chatInputRow button {
            border: none;
            background: #3366cc;
            color: #fff;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        #chatInputRow button:hover { background: #254ea6; }

        /* 방 목록 */
        .room-item { padding: 8px 12px; margin: 4px 0; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .room-item:hover { background: #eef4ff; border-color: #99c; }
        .room-item.active { background: #ddeeff; border-color: #339; font-weight: bold; }
        .room-name { font-weight: bold; }
        .room-last { color: #888; font-size: 12px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 로그 */
        #log { background: #f5f5f5; padding: 12px; height: 200px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; }
        .ok  { color: #2a7a2a; }
        .err { color: #cc0000; }
    </style>
</head>
<body>

<h2>WebSocket / STOMP E2E Test</h2>

<!-- Step 1: 로그인 -->
<section>
    <h3>1. 로그인</h3>
    <input id="username" placeholder="username" value="testuser" style="width:140px;" />
    <input id="password" placeholder="password" type="password" value="1234" style="width:120px;" />
    <button onclick="login()">로그인</button>
    <span id="loginStatus" style="margin-left:10px; font-size:12px; color:#555;">-</span>
</section>

<!-- Step 2: 채팅방 생성 -->
<section>
    <h3>2. 채팅방 생성</h3>
    <div style="margin-bottom:8px;">
        <strong>1:1</strong>
        <input id="targetUserId" placeholder="상대방 userId" style="width:110px;" />
        <button onclick="createDirectRoom()">생성</button>
    </div>
    <div>
        <strong>그룹</strong>
        <input id="groupRoomName" placeholder="방 이름" style="width:110px;" />
        초대 userId (콤마):
        <input id="invitedUserIds" placeholder="1,2,3" style="width:100px;" />
        <button onclick="createGroupRoom()">생성</button>
    </div>
</section>

<!-- Step 3: 내 채팅방 목록 -->
<section>
    <h3>3. 내 채팅방 목록</h3>
    <button onclick="loadRooms()">목록 조회</button>
    <div id="roomList" style="margin-top:10px; font-size:13px;"></div>
</section>

<!-- Step 4: 채팅 -->
<section>
    <h3>4. 채팅
        <span style="font-weight:normal; font-size:13px; margin-left:8px;">
            roomId: <input id="roomId" placeholder="roomId" style="width:70px;" />
            <button onclick="connect()">연결</button>
            <button onclick="disconnect()" style="margin-left:4px;">끊기</button>
        </span>
    </h3>
    <div id="chatArea">
        <div id="chatHeader">
            <div id="connDot" class="off"></div>
            <span id="chatRoomLabel">연결 대기 중</span>
        </div>
        <div id="chatMessages">
            <div class="empty-hint">채팅방에 연결하면 메시지가 여기에 표시됩니다.</div>
        </div>
        <div id="chatInputRow">
            <input id="content" placeholder="메시지를 입력하세요..." />
            <button onclick="sendMessage()">전송</button>
        </div>
    </div>
</section>

<!-- 로그 -->
<section>
    <h3>5. 로그 <button onclick="clearLog()" style="float:right; font-size:12px;">지우기</button></h3>
    <div id="log"></div>
</section>

<script>
    let token = null;
    let myUsername = null;
    let stompClient = null;
    let currentRoomId = null;

    function log(msg, cls = '') {
        const div = document.getElementById('log');
        const line = document.createElement('div');
        line.className = cls;
        line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        div.appendChild(line);
        div.scrollTop = div.scrollHeight;
    }

    function clearLog() { document.getElementById('log').innerHTML = ''; }

    // TODO(human): 메시지 말풍선 HTML을 반환하는 함수를 구현하세요.
    // msg: { id, senderUserId, senderUsername, content, createdAt, deleted }
    // isMine: 내가 보낸 메시지 여부 (boolean)
    // 반환값: 채팅 말풍선 HTML 문자열
    function renderMessage(msg, isMine) {
        // 여기에 구현하세요
    }

    function appendMessage(msg, isMine) {
        const container = document.getElementById('chatMessages');
        const hint = container.querySelector('.empty-hint');
        if (hint) hint.remove();

        const html = renderMessage(msg, isMine);
        if (!html) return;

        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        container.appendChild(wrapper.firstElementChild);
        container.scrollTop = container.scrollHeight;
    }

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            token = data.accessToken;
            myUsername = username;
            document.getElementById('loginStatus').textContent = `✓ ${username} 로그인 완료`;
            log(`로그인 성공 — ${username}`, 'ok');
        } catch (e) {
            log(`로그인 실패: ${e.message}`, 'err');
        }
    }

    async function loadRooms() {
        if (!token) { log('먼저 로그인하세요.', 'err'); return; }
        try {
            const res = await fetch('/api/rooms', { headers: { 'Authorization': `Bearer ${token}` } });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const rooms = await res.json();
            const container = document.getElementById('roomList');
            if (rooms.length === 0) {
                container.innerHTML = '<div style="color:#888;">채팅방이 없습니다.</div>';
                return;
            }
            container.innerHTML = rooms.map(r => `
                <div class="room-item" id="room-${r.id}" onclick="selectRoom(${r.id})">
                    <span class="room-name">[${r.id}] ${r.name}</span>
                    <span class="room-last">${r.lastMessageContent ?? '메시지 없음'}</span>
                </div>
            `).join('');
            log(`채팅방 목록 조회 완료 — ${rooms.length}개`, 'ok');
        } catch (e) {
            log(`목록 조회 실패: ${e.message}`, 'err');
        }
    }

    function selectRoom(roomId) {
        document.querySelectorAll('.room-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`room-${roomId}`)?.classList.add('active');
        document.getElementById('roomId').value = roomId;
        log(`roomId ${roomId} 선택됨`);
    }

    async function createDirectRoom() {
        if (!token) { log('먼저 로그인하세요.', 'err'); return; }
        const targetUserId = parseInt(document.getElementById('targetUserId').value);
        try {
            const res = await fetch('/api/rooms/direct', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ targetUserId })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            document.getElementById('roomId').value = data.id;
            log(`1:1 방 생성 완료 — roomId: ${data.id}`, 'ok');
        } catch (e) {
            log(`방 생성 실패: ${e.message}`, 'err');
        }
    }

    async function createGroupRoom() {
        if (!token) { log('먼저 로그인하세요.', 'err'); return; }
        const name = document.getElementById('groupRoomName').value;
        const invitedUserIds = document.getElementById('invitedUserIds').value
            .split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
        try {
            const res = await fetch('/api/rooms/group', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name, invitedUserIds })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            document.getElementById('roomId').value = data.id;
            log(`그룹 방 생성 완료 — roomId: ${data.id}`, 'ok');
        } catch (e) {
            log(`방 생성 실패: ${e.message}`, 'err');
        }
    }

    function connect() {
        if (!token) { log('먼저 로그인하세요.', 'err'); return; }
        const roomId = document.getElementById('roomId').value;
        if (!roomId) { log('roomId를 입력하세요.', 'err'); return; }

        currentRoomId = roomId;
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('chatRoomLabel').textContent = `Room #${roomId}`;

        stompClient = new StompJs.Client({
            webSocketFactory: () => new SockJS('/ws'),
            connectHeaders: { Authorization: `Bearer ${token}` },
            onConnect: () => {
                document.getElementById('connDot').className = 'on';
                log(`Room #${roomId} 연결 성공`, 'ok');

                stompClient.subscribe(`/sub/room/${roomId}`, (frame) => {
                    const msg = JSON.parse(frame.body);
                    appendMessage(msg, msg.senderUsername === myUsername);
                });
            },
            onDisconnect: () => {
                document.getElementById('connDot').className = 'off';
                document.getElementById('chatRoomLabel').textContent = '연결 종료';
                log('연결 종료');
            },
            onStompError: (frame) => {
                log(`STOMP 오류: ${frame.headers['message']}`, 'err');
            }
        });
        stompClient.activate();
    }

    function disconnect() { stompClient?.deactivate(); }

    function sendMessage() {
        if (!stompClient?.connected) { log('먼저 연결하세요.', 'err'); return; }
        const content = document.getElementById('content').value;
        if (!content.trim()) return;
        stompClient.publish({
            destination: '/pub/chat.send',
            body: JSON.stringify({ roomId: parseInt(currentRoomId), content })
        });
        document.getElementById('content').value = '';
    }

    document.getElementById('content').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
